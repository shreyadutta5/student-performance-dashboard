<!DOCTYPE html>
<html>
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <h1>Student Performance Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h3>Average Marks</h3>
            <p>59.25</p>
        </div>

        <div class="card">
            <h3>Highest Marks</h3>
            <p>90</p>
        </div>

        <div class="card">
            <h3>Total Students</h3>
            <p>5</p>
        </div>
    </div>

    <div class="chart-container">
        <h2>Average Marks per Student</h2>
        <canvas id="marksChart"></canvas>
    </div>

    <table>
        <tr>
            <th>Name</th>
            <th>Department</th>
            <th>Subject</th>
            <th>Marks</th>
        </tr>
        <tr><td>Shreya</td><td>CSE</td><td>Math</td><td>85</td></tr>
        <tr><td>Shreya</td><td>CSE</td><td>Science</td><td>78</td></tr>
        <tr><td>Rahul</td><td>IT</td><td>Math</td><td>90</td></tr>
        <tr><td>Rahul</td><td>IT</td><td>Science</td><td>0</td></tr>
        <tr><td>Ananya</td><td>CSE</td><td>Math</td><td>76</td></tr>
        <tr><td>Ananya</td><td>CSE</td><td>Science</td><td>80</td></tr>
        <tr><td>Amit</td><td>ECE</td><td>Math</td><td>65</td></tr>
        <tr><td>Priya</td><td>IT</td><td>Science</td><td>0</td></tr>
    </table>

    <script>
        const labels = ["Amit", "Ananya", "Priya", "Rahul", "Shreya"];
        const values = [65, 78, 0, 45, 81.5];

        const ctx = document.getElementById('marksChart').getContext('2d');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Average Marks',
                    data: values,
                    backgroundColor: '#1f3c88',
                    minBarLength: 3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    </script>

</body>
</html>
